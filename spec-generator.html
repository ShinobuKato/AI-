<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>仕様書ジェネレーター｜VIA JAPAN</title>
<script src="https://unpkg.com/docx@8.5.0/build/index.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700;900&family=Montserrat:wght@300;400;700;900&display=swap" rel="stylesheet">
<style>
:root {
  --ocean: #0a4f6e; --sky: #1a8cb0; --aqua: #2ec4e8;
  --white: #fafcff; --ink: #0d1f2d; --muted: #5a7a8a;
  --glass-border: rgba(255,255,255,0.15); --card-bg: rgba(255,255,255,0.05);
  --surplus: #4eca9e; --sand: #f5e6c8; --deficit: #ff6b6b;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: 'Noto Sans JP', sans-serif;
  background: linear-gradient(135deg, #061624 0%, #0a2f45 40%, #0d3d5a 70%, #062030 100%);
  min-height: 100vh; color: var(--white); overflow-x: hidden;
}
body::before {
  content: ''; position: fixed; inset: 0; pointer-events: none; z-index: 0;
  background: radial-gradient(ellipse 80% 40% at 20% 80%, rgba(46,196,232,0.07) 0%, transparent 60%),
              radial-gradient(ellipse 60% 30% at 80% 20%, rgba(26,140,176,0.05) 0%, transparent 50%);
}

/* ===== LOGIN ===== */
#login-screen {
  position: fixed; inset: 0; display: flex; align-items: center; justify-content: center;
  background: linear-gradient(135deg, #061624, #0a2f45); z-index: 200;
}
.login-card {
  background: rgba(255,255,255,0.06); border: 1px solid var(--glass-border);
  border-radius: 24px; padding: 52px 44px; width: 400px; backdrop-filter: blur(20px);
  position: relative; z-index: 1;
}
.login-logo {
  font-family: 'Montserrat', sans-serif; font-weight: 900; font-size: 22px;
  color: var(--aqua); text-align: center; letter-spacing: 0.15em; margin-bottom: 6px;
}
.login-sub { text-align: center; font-size: 13px; color: var(--muted); margin-bottom: 40px; }
.l-group { margin-bottom: 20px; }
.l-label { display: block; font-size: 11px; color: var(--muted); letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 8px; }
.l-input {
  width: 100%; background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.12);
  border-radius: 10px; padding: 13px 16px; color: var(--white);
  font-family: 'Noto Sans JP', sans-serif; font-size: 15px; outline: none; transition: border-color 0.2s;
}
.l-input:focus { border-color: var(--aqua); box-shadow: 0 0 0 3px rgba(46,196,232,0.12); }
.l-input.err { border-color: var(--deficit); }
.l-error { font-size: 12px; color: var(--deficit); margin-top: 8px; display: none; }
.btn-login {
  width: 100%; padding: 15px; background: linear-gradient(135deg, var(--aqua), var(--sky));
  color: var(--ink); border: none; border-radius: 10px; font-weight: 900; font-size: 14px;
  cursor: pointer; font-family: 'Noto Sans JP', sans-serif; letter-spacing: 0.05em;
  transition: all 0.2s; margin-top: 6px;
}
.btn-login:hover { transform: translateY(-1px); box-shadow: 0 8px 24px rgba(46,196,232,0.35); }

/* ===== APP ===== */
#app-screen { position: relative; z-index: 1; }
.wrapper { max-width: 860px; margin: 0 auto; padding: 0 20px 80px; }
.app-header {
  padding: 44px 0 32px; display: flex; align-items: center;
  justify-content: space-between; border-bottom: 1px solid var(--glass-border); margin-bottom: 36px;
}
.app-badge {
  font-family: 'Montserrat', sans-serif; font-size: 10px; letter-spacing: 0.2em;
  background: linear-gradient(135deg, var(--aqua), var(--sky)); color: var(--ink);
  padding: 5px 14px; border-radius: 20px; font-weight: 900; display: inline-block; margin-bottom: 10px;
}
.app-title { font-family: 'Montserrat', sans-serif; font-weight: 900; font-size: 28px; }
.app-title span { color: var(--aqua); }
.btn-logout {
  background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.12);
  color: var(--muted); padding: 9px 18px; border-radius: 8px; font-size: 12px;
  cursor: pointer; font-family: 'Noto Sans JP', sans-serif; transition: all 0.2s;
}
.btn-logout:hover { background: rgba(255,255,255,0.1); color: var(--white); }

/* ===== SECTION ===== */
.section {
  background: var(--card-bg); border: 1px solid var(--glass-border);
  border-radius: 16px; padding: 28px; backdrop-filter: blur(12px); margin-bottom: 18px;
}
.sec-title {
  font-family: 'Montserrat', sans-serif; font-weight: 700; font-size: 11px;
  letter-spacing: 0.2em; text-transform: uppercase; color: var(--aqua);
  margin-bottom: 22px; display: flex; align-items: center; gap: 10px;
}
.sec-title::before { content: ''; display: block; width: 20px; height: 2px; background: var(--aqua); flex-shrink: 0; }
.field-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
@media (max-width: 600px) { .field-grid { grid-template-columns: 1fr; } }
.col-full { grid-column: 1 / -1; }
.f-group { display: flex; flex-direction: column; gap: 6px; }
.f-label { font-size: 12px; color: var(--muted); font-weight: 500; letter-spacing: 0.03em; }
.f-hint { font-size: 10px; color: rgba(90,122,138,0.8); }
.f-input, .f-select, .f-textarea {
  background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.1);
  border-radius: 10px; padding: 11px 14px; color: var(--white);
  font-family: 'Noto Sans JP', sans-serif; font-size: 14px; outline: none;
  transition: border-color 0.2s; width: 100%;
}
.f-input:focus, .f-select:focus, .f-textarea:focus {
  border-color: var(--aqua); box-shadow: 0 0 0 3px rgba(46,196,232,0.1);
}
.f-select option { background: #0a2f45; color: var(--white); }
.f-textarea { resize: vertical; min-height: 72px; }

/* ===== GENERATE ===== */
.gen-wrap { text-align: center; padding: 40px 0 20px; }
.btn-gen {
  padding: 18px 52px; background: linear-gradient(135deg, var(--aqua), var(--sky));
  color: var(--ink); border: none; border-radius: 14px; font-weight: 900; font-size: 16px;
  cursor: pointer; font-family: 'Noto Sans JP', sans-serif; letter-spacing: 0.05em;
  transition: all 0.2s; display: inline-flex; align-items: center; gap: 12px;
}
.btn-gen:hover { transform: translateY(-2px); box-shadow: 0 12px 36px rgba(46,196,232,0.45); }
.btn-gen:disabled { opacity: 0.55; cursor: not-allowed; transform: none; box-shadow: none; }
.gen-note { font-size: 12px; color: var(--muted); margin-top: 14px; }

/* ===== TOAST ===== */
.toast {
  position: fixed; bottom: 30px; right: 30px; background: var(--surplus); color: var(--ink);
  padding: 14px 24px; border-radius: 10px; font-weight: 700; font-size: 13px;
  z-index: 9999; opacity: 0; transform: translateY(20px); transition: all 0.3s; pointer-events: none;
}
.toast.show { opacity: 1; transform: translateY(0); }
</style>
</head>
<body>

<!-- ==================== LOGIN ==================== -->
<div id="login-screen">
  <div class="login-card">
    <div class="login-logo">VIA JAPAN</div>
    <div class="login-sub">仕様書ジェネレーター — 社内ツール</div>
    <div class="l-group">
      <label class="l-label">ユーザーID</label>
      <input type="text" id="l-id" class="l-input" placeholder="ID" autocomplete="username">
    </div>
    <div class="l-group">
      <label class="l-label">パスワード</label>
      <input type="password" id="l-pw" class="l-input" placeholder="Password" autocomplete="current-password">
      <div class="l-error" id="l-error">IDまたはパスワードが正しくありません</div>
    </div>
    <button class="btn-login" onclick="tryLogin()">ログイン</button>
  </div>
</div>

<!-- ==================== APP ==================== -->
<div id="app-screen" style="display:none">
  <div class="wrapper">
    <div class="app-header">
      <div>
        <div class="app-badge">INTERNAL TOOL</div>
        <div class="app-title">仕様書<span>ジェネレーター</span></div>
      </div>
      <button class="btn-logout" onclick="doLogout()">ログアウト</button>
    </div>

    <!-- 基本情報 -->
    <div class="section">
      <div class="sec-title">基本情報</div>
      <div class="field-grid">
        <div class="f-group">
          <label class="f-label">自治体名 *</label>
          <input type="text" id="f-org" class="f-input" placeholder="例：佐賀市">
        </div>
        <div class="f-group">
          <label class="f-label">担当部署</label>
          <input type="text" id="f-dept" class="f-input" value="総務部交通政策課" placeholder="例：総務部交通政策課">
        </div>
        <div class="f-group">
          <label class="f-label">年度（令和○年度）</label>
          <input type="number" id="f-nendo" class="f-input" value="8" min="1" max="99" placeholder="例：8">
        </div>
        <div class="f-group">
          <label class="f-label">業務期間終了日</label>
          <input type="text" id="f-period-end" class="f-input" value="令和9年3月31日" placeholder="例：令和9年3月31日">
        </div>
      </div>
    </div>

    <!-- スケジュール -->
    <div class="section">
      <div class="sec-title">スケジュール</div>
      <div class="field-grid">
        <div class="f-group">
          <label class="f-label">運行開始月</label>
          <select id="f-start-month" class="f-select">
            <option value="6">6月</option>
            <option value="7">7月</option>
            <option value="8">8月</option>
            <option value="9">9月</option>
            <option value="10" selected>10月</option>
            <option value="11">11月</option>
            <option value="12">12月</option>
          </select>
          <div class="f-hint">スケジュール表の月列に自動反映されます</div>
        </div>
        <div class="f-group">
          <label class="f-label">実証運行終了（翌年）</label>
          <select id="f-end-month" class="f-select">
            <option value="1">1月</option>
            <option value="2" selected>2月</option>
            <option value="3">3月</option>
          </select>
        </div>
      </div>
    </div>

    <!-- 運行概要 -->
    <div class="section">
      <div class="sec-title">運行概要</div>
      <div class="field-grid">
        <div class="f-group">
          <label class="f-label">運行時間</label>
          <input type="text" id="f-ophours" class="f-input" value="午前9時〜午後3時" placeholder="例：午前9時〜午後3時">
        </div>
        <div class="f-group">
          <label class="f-label">出発・帰着時刻</label>
          <input type="text" id="f-depot" class="f-input" value="午前8時出発・午後4時帰着" placeholder="例：午前8時出発・午後4時帰着">
        </div>
        <div class="f-group col-full">
          <label class="f-label">運行エリア名</label>
          <input type="text" id="f-area" class="f-input" placeholder="例：昭栄地区・鍋島地区">
        </div>
        <div class="f-group">
          <label class="f-label">エリア面積・人口</label>
          <input type="text" id="f-area-info" class="f-input" placeholder="例：約15㎢・約31,600人">
        </div>
        <div class="f-group">
          <label class="f-label">運行台数・車種</label>
          <input type="text" id="f-vehicles" class="f-input" value="ジャンボ車両（9人乗り）1台・普通車両（2人乗り）1台　計2台">
        </div>
        <div class="f-group">
          <label class="f-label">運賃（円）</label>
          <input type="number" id="f-fare" class="f-input" value="400" min="0">
        </div>
      </div>
    </div>

    <!-- Generate -->
    <div class="gen-wrap">
      <button class="btn-gen" id="gen-btn" onclick="generateDoc()">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/>
          <polyline points="14 2 14 8 20 8"/>
          <line x1="12" y1="18" x2="12" y2="12"/>
          <line x1="9" y1="15" x2="15" y2="15"/>
        </svg>
        Word仕様書を生成・ダウンロード
      </button>
      <div class="gen-note">※ .docx ファイルが自動でダウンロードされます</div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ============================================================
// AUTH
// ============================================================
const AUTH_ID = 'via';
const AUTH_PW = 'via2025';

function tryLogin() {
  const id = document.getElementById('l-id').value.trim();
  const pw = document.getElementById('l-pw').value;
  if (id === AUTH_ID && pw === AUTH_PW) {
    sessionStorage.setItem('spec_auth', '1');
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('app-screen').style.display = 'block';
  } else {
    document.getElementById('l-error').style.display = 'block';
    ['l-id','l-pw'].forEach(i => document.getElementById(i).classList.add('err'));
  }
}
function doLogout() {
  sessionStorage.removeItem('spec_auth');
  document.getElementById('app-screen').style.display = 'none';
  document.getElementById('login-screen').style.display = 'flex';
}
document.getElementById('l-pw').addEventListener('keydown', e => { if (e.key === 'Enter') tryLogin(); });
document.getElementById('l-id').addEventListener('keydown', e => { if (e.key === 'Enter') document.getElementById('l-pw').focus(); });
if (sessionStorage.getItem('spec_auth') === '1') {
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('app-screen').style.display = 'block';
}

// ============================================================
// SCHEDULE BUILDER
// ============================================================
function buildSched(startMonth) {
  // Columns: April → startMonth (individual) + "以降"
  const months = [];
  for (let m = 4; m <= startMonth; m++) months.push(m);
  const nCols = months.length + 1;
  const sIdx  = months.length - 1; // index of the operation start month
  const headers = months.map(m => m + '月').concat(['以降〜3月']);

  function row(label, acts) {
    const cells = Array(nCols).fill('');
    for (const [from, to, val] of acts) {
      for (let i = Math.max(0, from); i <= Math.min(nCols - 1, to); i++) cells[i] = val;
    }
    return { label, cells };
  }

  const rows = [
    row('補助金申請・プロポーザル',  [[0, 1, '◎']]),
    row('公共交通会議・運賃協議会',  [[1, 1, '△'], [2, Math.max(2, sIdx - 2), '◎']]),
    row('道路運送法申請',           [[Math.max(2,sIdx-4), Math.max(2,sIdx-4), '△'],
                                     [Math.max(2,sIdx-3), sIdx-2, '◎'],
                                     [sIdx-1, sIdx-1, '審査']]),
    row('システム設定・開発',        [[Math.max(0, sIdx - 3), sIdx - 1, '◎']]),
    row('ドライバー・オペレーター研修',[[Math.max(0, sIdx - 1), sIdx - 1, '◎']]),
    row('住民説明会・利用促進活動',   [[Math.max(0,sIdx-2), sIdx-2, '△'],
                                     [Math.max(0,sIdx-1), sIdx, '◎'],
                                     [nCols-1, nCols-1, '継続']]),
    row('実証運行',                 [[sIdx, sIdx, '◎開始'], [nCols-1, nCols-1, '継続']]),
    row('月次データ分析・改善',      [[sIdx, sIdx, '◎'],     [nCols-1, nCols-1, '毎月']]),
  ];
  return { headers, rows, nCols };
}

// ============================================================
// DOC GENERATION
// ============================================================
async function generateDoc() {
  const org = document.getElementById('f-org').value.trim();
  if (!org) { showToast('⚠ 自治体名を入力してください'); return; }

  const btn = document.getElementById('gen-btn');
  btn.disabled = true;
  btn.innerHTML = '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg> 生成中...';

  try {
    const {
      Document, Packer, Paragraph, TextRun, Table, TableRow, TableCell,
      Header, Footer, AlignmentType, HeadingLevel, BorderStyle, WidthType,
      ShadingType, PageNumber, LevelFormat, TabStopType, PageBreak
    } = window.docx;

    // ---- values ----
    const dept       = document.getElementById('f-dept').value.trim() || '交通政策課';
    const nendo      = document.getElementById('f-nendo').value || '8';
    const periodEnd  = document.getElementById('f-period-end').value.trim() || `令和${parseInt(nendo)+1}年3月31日`;
    const opHours    = document.getElementById('f-ophours').value.trim() || '午前9時〜午後3時';
    const depot      = document.getElementById('f-depot').value.trim() || '午前8時出発・午後4時帰着';
    const area       = document.getElementById('f-area').value.trim() || '○○地区';
    const areaInfo   = document.getElementById('f-area-info').value.trim();
    const vehicles   = document.getElementById('f-vehicles').value.trim() || '2台';
    const fare       = document.getElementById('f-fare').value || '400';
    const startMonth = parseInt(document.getElementById('f-start-month').value);
    const endMonth   = parseInt(document.getElementById('f-end-month').value);

    const sched = buildSched(startMonth);
    const endMonthStr = `令和${parseInt(nendo)+1}年${endMonth}月`;
    const opPeriod = `令和${nendo}年${startMonth}月1日〜${endMonthStr}末日（予定）\n平日・土日祝日の毎日\n${opHours}（${depot}）`;
    const areaFull = area + (areaInfo ? `\n（エリア外の病院等、主要目的地への乗降も可能とする）\n${areaInfo}` : '');

    // ---- colors / borders ----
    const BLUE = "1F497D", LB = "DCE6F1", MB = "4472C4", GR = "F2F2F2", WH = "FFFFFF";
    const bThin = { style: BorderStyle.SINGLE, size: 4, color: "AAAAAA" };
    const bMid  = { style: BorderStyle.SINGLE, size: 6, color: MB };
    const allB  = { top: bThin, bottom: bThin, left: bThin, right: bThin };

    // ---- helpers ----
    const sp = (n=80) => new Paragraph({ children: [new TextRun("")], spacing: { after: n } });

    function H1(t) {
      return new Paragraph({ heading: HeadingLevel.HEADING_1,
        children: [new TextRun({ text: t, bold: true })],
        spacing: { before: 360, after: 120 },
        border: { bottom: { style: BorderStyle.SINGLE, size: 6, color: MB, space: 4 } } });
    }
    function H2(t) {
      return new Paragraph({ heading: HeadingLevel.HEADING_2,
        children: [new TextRun({ text: t, bold: true })], spacing: { before: 240, after: 80 } });
    }
    function H3(t) {
      return new Paragraph({ heading: HeadingLevel.HEADING_3,
        children: [new TextRun({ text: t, bold: true })], spacing: { before: 160, after: 60 } });
    }
    function P(t, opts={}) {
      return new Paragraph({ children: [new TextRun({ text: t, ...opts })], spacing: { after: 80 } });
    }
    function B(t, lvl=0) {
      return new Paragraph({ numbering: { reference: "bullets", level: lvl },
        children: [new TextRun({ text: t })], spacing: { after: 60 } });
    }
    function infoRow(lbl, val, hi=false) {
      return new TableRow({ children: [
        new TableCell({ borders: allB, width: { size: 2800, type: WidthType.DXA },
          shading: { fill: hi ? LB : GR, type: ShadingType.CLEAR },
          margins: { top: 80, bottom: 80, left: 150, right: 100 },
          children: [new Paragraph({ children: [new TextRun({ text: lbl, bold: true, size: 20 })] })] }),
        new TableCell({ borders: allB, width: { size: 6202, type: WidthType.DXA },
          shading: { fill: WH, type: ShadingType.CLEAR },
          margins: { top: 80, bottom: 80, left: 150, right: 100 },
          children: [new Paragraph({ children: [new TextRun({ text: val, size: 20 })] })] }),
      ]});
    }
    function hdrRow(cols, ws) {
      return new TableRow({ tableHeader: true, children: cols.map((c, i) =>
        new TableCell({ borders: allB, width: { size: ws[i], type: WidthType.DXA },
          shading: { fill: MB, type: ShadingType.CLEAR },
          margins: { top: 80, bottom: 80, left: 120, right: 120 },
          children: [new Paragraph({ alignment: AlignmentType.CENTER,
            children: [new TextRun({ text: c, bold: true, color: WH, size: 20 })] })] })
      )});
    }
    function datRow(cols, ws, shade=false) {
      return new TableRow({ children: cols.map((c, i) =>
        new TableCell({ borders: allB, width: { size: ws[i], type: WidthType.DXA },
          shading: { fill: shade ? GR : WH, type: ShadingType.CLEAR },
          margins: { top: 80, bottom: 80, left: 120, right: 120 },
          children: [new Paragraph({ children: [new TextRun({ text: String(c ?? ''), size: 20 })] })] })
      )});
    }

    // ---- schedule table widths ----
    const totalW = 9002, labelW = 2400;
    const colW = Math.floor((totalW - labelW) / sched.nCols);
    const schedWs = [labelW, ...sched.headers.map(() => colW)];

    function schedRow(r, shade) {
      return new TableRow({ children: [
        new TableCell({ borders: allB, width: { size: labelW, type: WidthType.DXA },
          shading: { fill: shade ? GR : WH, type: ShadingType.CLEAR },
          margins: { top: 60, bottom: 60, left: 120, right: 60 },
          children: [new Paragraph({ children: [new TextRun({ text: r.label, size: 18 })] })] }),
        ...r.cells.map(c => new TableCell({ borders: allB, width: { size: colW, type: WidthType.DXA },
          shading: { fill: shade ? GR : WH, type: ShadingType.CLEAR },
          margins: { top: 60, bottom: 60, left: 40, right: 40 },
          children: [new Paragraph({ alignment: AlignmentType.CENTER,
            children: [new TextRun({ text: c, size: 16 })] })] }))
      ]});
    }

    // ---- build doc ----
    const doc = new Document({
      numbering: { config: [{ reference: "bullets", levels: [
        { level: 0, format: LevelFormat.BULLET, text: "\u2022", alignment: AlignmentType.LEFT,
          style: { paragraph: { indent: { left: 600, hanging: 300 } } } },
        { level: 1, format: LevelFormat.BULLET, text: "\u25E6", alignment: AlignmentType.LEFT,
